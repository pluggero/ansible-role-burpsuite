---
- name: Assert that burpsuite_edition is valid
  ansible.builtin.assert:
    that:
      - burpsuite_edition in ['community', 'pro']
    fail_msg: >-
      The value of "burpsuite_edition" ({{ burpsuite_edition }}) is invalid.
      Must be one of: [community, pro].
    success_msg: "The value of 'burpsuite_edition' is valid."

- name: Assert that burpsuite_release_channel is valid
  ansible.builtin.assert:
    that:
      - burpsuite_release_channel in ['Stable', 'Early Adopter']
    fail_msg: >-
      The value of "burpsuite_release_channel" ({{ burpsuite_release_channel }}) is invalid.
      Must be one of: [Stable, Early Adopter].
    success_msg: "The value of 'burpsuite_release_channel' is valid."

- name: Assert that burpsuite_install_method is valid
  ansible.builtin.assert:
    that:
      - burpsuite_install_method == 'source'
    fail_msg: >-
      The value of "burpsuite_install_method" ({{ burpsuite_install_method }}) is invalid.
      Must be: [source].
    success_msg: "The value of 'burpsuite_install_method' is valid."

- name: Extract bapp_uuid values from community extensions
  ansible.builtin.set_fact:
    burpsuite_community_uuids: "{{ burpsuite_extensions_bapp_community | map(attribute='bapp_uuid') | list }}"
  when: burpsuite_extensions_bapp_community | length > 0

- name: Extract bapp_uuid values from pro extensions
  ansible.builtin.set_fact:
    burpsuite_pro_uuids: "{{ burpsuite_extensions_bapp_pro | map(attribute='bapp_uuid') | list }}"
  when: burpsuite_extensions_bapp_pro | length > 0

- name: Assert that no duplicate bapp_uuid exists between community and pro extensions
  ansible.builtin.assert:
    that:
      - burpsuite_community_uuids | intersect(burpsuite_pro_uuids) | length == 0
    fail_msg: >-
      Duplicate bapp_uuid found in both burpsuite_extensions_bapp_community and burpsuite_extensions_bapp_pro.
      Duplicates: {{ burpsuite_community_uuids | intersect(burpsuite_pro_uuids) | join(', ') }}.
      Each extension must appear in only one list.
    success_msg: "No duplicate extensions found between community and pro lists."
  when:
    - burpsuite_extensions_bapp_community | length > 0
    - burpsuite_extensions_bapp_pro | length > 0

- name: Validate priority field in BApp extensions
  ansible.builtin.assert:
    that:
      - item.priority is not defined or (item.priority | type_debug == 'int')
    fail_msg: >-
      Extension '{{ item.name }}' has invalid priority field.
      Priority must be an integer, got: {{ item.priority | type_debug }}.
    success_msg: "Extension '{{ item.name }}' has valid priority field."
  loop: "{{ burpsuite_extensions_bapp }}"
  when: burpsuite_extensions_bapp | length > 0

- name: Validate priority field in external extensions
  ansible.builtin.assert:
    that:
      - item.priority is not defined or (item.priority | type_debug == 'int')
    fail_msg: >-
      Extension '{{ item.name }}' has invalid priority field.
      Priority must be an integer, got: {{ item.priority | type_debug }}.
    success_msg: "Extension '{{ item.name }}' has valid priority field."
  loop: "{{ burpsuite_extensions_external }}"
  when: burpsuite_extensions_external | length > 0

- name: Check for duplicate priority values (warning only)
  block:
    - name: Collect all extensions with explicit priority
      ansible.builtin.set_fact:
        burpsuite_all_priorities: >-
          {{ (burpsuite_extensions_bapp | selectattr('priority', 'defined') | list) +
             (burpsuite_extensions_external | selectattr('priority', 'defined') | list) }}

    - name: Extract priority values
      ansible.builtin.set_fact:
        burpsuite_priority_values: "{{ burpsuite_all_priorities | map(attribute='priority') | list }}"
      when: burpsuite_all_priorities | length > 0

    - name: Warn about duplicate priorities
      ansible.builtin.debug:
        msg: >-
          WARNING: Duplicate priority values found: {{ burpsuite_priority_values | unique | difference(burpsuite_priority_values) }}.
          Extensions with the same priority may load in unpredictable order.
      when:
        - burpsuite_all_priorities | length > 0
        - burpsuite_priority_values | length != (burpsuite_priority_values | unique | length)

- name: Assert that burpsuite_collaborator_type is valid
  ansible.builtin.assert:
    that:
      - burpsuite_collaborator_type in ['default', 'none', 'private']
    fail_msg: >-
      The value of "burpsuite_collaborator_type" ({{ burpsuite_collaborator_type }}) is invalid.
      Must be one of: [default, none, private].
    success_msg: "The value of 'burpsuite_collaborator_type' is valid."

- name: Assert that private collaborator configuration is complete
  ansible.builtin.assert:
    that:
      - burpsuite_collaborator_location | length > 0
      - burpsuite_collaborator_polling_location | length > 0
    fail_msg: >-
      When burpsuite_collaborator_type is 'private', both burpsuite_collaborator_location
      and burpsuite_collaborator_polling_location must be set.
    success_msg: "Private collaborator configuration is valid."
  when: burpsuite_collaborator_type == "private"
