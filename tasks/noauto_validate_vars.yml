---
- name: Assert that burpsuite_edition is valid
  ansible.builtin.assert:
    that:
      - burpsuite_edition in ['community', 'pro']
    fail_msg: >-
      The value of "burpsuite_edition" ({{ burpsuite_edition }}) is invalid.
      Must be one of: [community, pro].
    success_msg: "The value of 'burpsuite_edition' is valid."

- name: Assert that burpsuite_release_channel is valid
  ansible.builtin.assert:
    that:
      - burpsuite_release_channel in ['Stable', 'Early Adopter']
    fail_msg: >-
      The value of "burpsuite_release_channel" ({{ burpsuite_release_channel }}) is invalid.
      Must be one of: [Stable, Early Adopter].
    success_msg: "The value of 'burpsuite_release_channel' is valid."

- name: Assert that burpsuite_install_method is valid
  ansible.builtin.assert:
    that:
      - burpsuite_install_method == 'source'
    fail_msg: >-
      The value of "burpsuite_install_method" ({{ burpsuite_install_method }}) is invalid.
      Must be: [source].
    success_msg: "The value of 'burpsuite_install_method' is valid."

- name: Extract bapp_uuid values from community extensions
  ansible.builtin.set_fact:
    burpsuite_community_uuids: "{{ burpsuite_extensions_bapp_community | map(attribute='bapp_uuid') | list }}"
  when: burpsuite_extensions_bapp_community | length > 0

- name: Extract bapp_uuid values from pro extensions
  ansible.builtin.set_fact:
    burpsuite_pro_uuids: "{{ burpsuite_extensions_bapp_pro | map(attribute='bapp_uuid') | list }}"
  when: burpsuite_extensions_bapp_pro | length > 0

- name: Assert that no duplicate bapp_uuid exists between community and pro extensions
  ansible.builtin.assert:
    that:
      - burpsuite_community_uuids | intersect(burpsuite_pro_uuids) | length == 0
    fail_msg: >-
      Duplicate bapp_uuid found in both burpsuite_extensions_bapp_community and burpsuite_extensions_bapp_pro.
      Duplicates: {{ burpsuite_community_uuids | intersect(burpsuite_pro_uuids) | join(', ') }}.
      Each extension must appear in only one list.
    success_msg: "No duplicate extensions found between community and pro lists."
  when:
    - burpsuite_extensions_bapp_community | length > 0
    - burpsuite_extensions_bapp_pro | length > 0
