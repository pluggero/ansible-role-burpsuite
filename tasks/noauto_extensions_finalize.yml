---
# Finalization: set permissions and cleanup for BApp extensions
# This runs after extraction completes (synchronous - fast operations)

- name: Set permissions and cleanup for {{ extension.name }}
  ansible.builtin.shell: |
    chown -R root:root "{{ burpsuite_extensions_dir }}/{{ extension.bapp_uuid }}"
    chmod -R 0665 "{{ burpsuite_extensions_dir }}/{{ extension.bapp_uuid }}"
    rm -f "{{ burpsuite_download_dir }}/{{ extension.bapp_uuid }}.bapp"
    rm -f "/tmp/burpsuite_{{ extension.bapp_uuid }}.bapp"
  become: true
  changed_when: true  # noqa: no-changed-when
